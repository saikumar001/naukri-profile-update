name: Update Naukri Profile

on:
  workflow_dispatch: 
  schedule:
    # Runs at ~10:00 AM, 2:00 PM, and 5:00 PM IST (Monday - Friday)
    - cron: '30 4 * * 1-5'
    - cron: '30 8 * * 1-5'
    - cron: '30 11 * * 1-5'

jobs:
  update-profile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches the python packages

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Profile Updater
      env:
        NAUKRI_COOKIES: ${{ secrets.NAUKRI_COOKIES }}
      run: python update_profile.py
