name: Update Naukri Profile Headline

on:
  workflow_dispatch: 
  schedule:
    # 10:00 AM IST (Monday to Friday)
    - cron: '30 4 * * 1-5'  
    
    # 2:00 PM IST (Monday to Friday)
    - cron: '30 8 * * 1-5'
    
    # 5:00 PM IST (Monday to Friday)
    - cron: '30 11 * * 1-5' 
jobs:
  update-profile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth
        playwright install chromium

    - name: Run Profile Updater
      env:
        NAUKRI_COOKIES: ${{ secrets.NAUKRI_COOKIES }}
      run: python update_profile.py