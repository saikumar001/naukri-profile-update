name: Update Naukri Profile

on:
  workflow_dispatch: # Allows you to manually click "Run" from the mobile app
  schedule:
    # Optional: Runs automatically every Monday-Friday at 9:30 AM IST (4:00 AM UTC)
    - cron: '0 4 * * 1-5' 

jobs:
  update-profile:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up future runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth
        playwright install chromium

    - name: Run Profile Updater
      env:
        # Passes your secret cookies into the Python environment
        NAUKRI_COOKIES: ${{ secrets.NAUKRI_COOKIES }}
      run: python update_profile.py